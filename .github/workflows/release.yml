name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-latest # macOS is required for building iOS artifacts
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.9'

      - name: Decode Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.YOUR_KEYSTORE_BASE64 }} # You need to define this secret
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > composeApp/key.jks

      - name: Set Signing Environment Variables
        env:
          STORE_PASSWORD: ${{ secrets.YOUR_STORE_PASSWORD }} # You need to define this secret
          KEY_ALIAS: ${{ secrets.YOUR_KEY_ALIAS }} # You need to define this secret
          KEY_PASSWORD: ${{ secrets.YOUR_KEY_PASSWORD }} # You need to define this secret
        run: |
          echo "STORE_PASSWORD=$STORE_PASSWORD" >> $GITHUB_ENV
          echo "KEY_ALIAS=$KEY_ALIAS" >> $GITHUB_ENV
          echo "KEY_PASSWORD=$KEY_PASSWORD" >> $GITHUB_ENV

      # Note: This builds an unsigned APK. For a production release, you would need to
      # configure signing in your build.gradle.kts file and store the keystore
      # and credentials securely in GitHub Secrets.
      - name: Build Android Debug APK
        run: gradle :composeApp:assembleDebug

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          # This will create a draft release. Set to false to publish automatically.
          draft: true
          # The body of the release will be populated with the changelog from the tag.
          generate_release_notes: true
          files: |
            composeApp/build/outputs/apk/debug/*.apk